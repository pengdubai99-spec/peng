<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PENG Partner - QR Code</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #050510;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
    }
    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 32px;
      padding: 48px;
      text-align: center;
      max-width: 480px;
      width: 90%;
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    }
    .logo {
      font-size: 48px;
      margin-bottom: 8px;
    }
    .brand {
      font-size: 32px;
      font-weight: 900;
      color: #818cf8;
      letter-spacing: 6px;
      margin-bottom: 4px;
    }
    .sub {
      font-size: 11px;
      font-weight: 800;
      color: #475569;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    #qrcode {
      display: inline-block;
      padding: 20px;
      background: #fff;
      border-radius: 20px;
      margin-bottom: 24px;
    }
    #qrcode img {
      display: block;
    }
    .url {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      color: #64748b;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 10px 18px;
      border-radius: 12px;
      margin-bottom: 24px;
      word-break: break-all;
    }
    .instructions {
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.8;
    }
    .instructions strong {
      color: #818cf8;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 12px;
      text-align: left;
      padding: 8px 0;
    }
    .step-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(99,102,241,0.15);
      color: #818cf8;
      font-weight: 900;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 20px 0;
    }
    .demo-info {
      background: rgba(16, 185, 129, 0.08);
      border: 1px solid rgba(16, 185, 129, 0.15);
      border-radius: 12px;
      padding: 12px 16px;
      margin-top: 16px;
    }
    .demo-info p {
      font-size: 11px;
      color: #10b981;
      font-weight: 700;
    }
    .demo-info code {
      font-family: 'Courier New', monospace;
      color: #34d399;
      font-size: 13px;
    }
    .glow {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: rgba(99,102,241,0.06);
      pointer-events: none;
    }
    .glow-1 { top: -100px; left: -100px; }
    .glow-2 { bottom: -100px; right: -100px; background: rgba(168,85,247,0.06); }
  </style>
</head>
<body>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="card">
    <div class="logo">🛡️</div>
    <div class="brand">PENG</div>
    <div class="sub">Partner App</div>

    <div id="qrcode"></div>

    <div class="url" id="expo-url"></div>

    <div class="divider"></div>

    <div class="instructions">
      <div class="step">
        <div class="step-num">1</div>
        <span>Telefonunuza <strong>Expo Go</strong> uygulamasını yükleyin</span>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <span>Aynı ağa bağlı olduğunuzdan emin olun</span>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <span>QR kodu <strong>Expo Go</strong> ile tarayın</span>
      </div>
    </div>

    <div class="demo-info">
      <p>Demo Giriş Bilgileri</p>
      <code>demo@peng.ae / demo</code>
    </div>
  </div>

  <script>
    // Expo URLs for different network interfaces
    const urls = [
      { label: 'Radmin VPN', url: 'exp://26.90.192.221:8081' },
      { label: 'Local', url: 'exp://192.168.137.1:8081' },
    ];

    // Use the primary URL (Radmin VPN for remote, or local WiFi)
    const expoUrl = urls[0].url;
    
    document.getElementById('expo-url').textContent = expoUrl;

    // Generate QR code
    const qr = qrcode(0, 'M');
    qr.addData(expoUrl);
    qr.make();
    document.getElementById('qrcode').innerHTML = qr.createImgTag(6, 0);
  </script>
</body>
</html>
